name: Documentation

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

# Needed for Documenter to push the built site to the gh-pages branch, for
# preview builds on pull requests, and for julia-actions/cache to manage caches.
permissions:
  actions: write
  contents: write
  pull-requests: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  build:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      # docs/make.jl loads only Documenter -- it never loads Carina itself, so
      # the sibling packages (ConstitutiveModels, FiniteElementContainers,
      # ReferenceFiniteElements) do not need to be cloned here the way they do
      # in ci.yml.
      - name: Instantiate docs environment
        run: julia --project=docs -e 'using Pkg; Pkg.instantiate()'

      - name: Build and deploy
        run: julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
