name: CI

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # midnight UTC daily
  workflow_dispatch:  # manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.12']
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      # Clone sibling dependencies (Project.toml uses relative paths)
      - name: Clone dependencies
        run: |
          cd ..
          git clone --depth 1 https://github.com/Cthonios/ConstitutiveModels.jl.git
          git clone --depth 1 https://github.com/Cthonios/FiniteElementContainers.jl.git
          git clone --depth 1 https://github.com/Cthonios/ReferenceFiniteElements.jl.git
          cd Carina.jl

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.update()
            Pkg.instantiate()
            Pkg.precompile()
          '

      - name: Run tests
        run: julia --project=. test/runtests.jl
