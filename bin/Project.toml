# Launcher environment for the `carina` CLI.  Carries the GPU vendor packages
# (CUDA.jl, AMDGPU.jl) so the Carina library itself stays vendor-free.
# Instantiated automatically on first use by the `bin/carina` wrapper.
[deps]
AMDGPU = "21141c5a-9bdb-4563-92ae-f87d6854732e"
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"
Carina = "d047b710-4602-46ef-9874-677b04211908"
ConstitutiveModels = "fc6ee7eb-129a-416f-804b-d7271ece6a3a"
FiniteElementContainers = "d08262e4-672f-4e7f-a976-f2cea5767631"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
ReferenceFiniteElements = "6dc62d09-f8eb-43fd-9672-074e490a997f"
YAML = "ddb6d928-2868-570f-bddf-ab3f9cf99eb6"

[sources]
Carina = {path = ".."}
ConstitutiveModels = {path = "../../ConstitutiveModels.jl"}
FiniteElementContainers = {path = "../../FiniteElementContainers.jl"}
ReferenceFiniteElements = {path = "../../ReferenceFiniteElements.jl"}
