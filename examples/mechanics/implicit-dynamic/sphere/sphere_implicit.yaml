"output mesh file": "sphere_implicit.e"
"input mesh file": "sphere.g"
device: "cpu"
model:
  material:
    blocks:
      sphere: "neohookean"
    neohookean:
      "elastic modulus": 10000.0
      density: 1000.0
      "Poisson's ratio": 0.33
  type: "solid mechanics"
"time integrator":
  "time step": 0.01
  gamma: 0.5
  "final time": 0.01
  "initial time": 0.0
  type: "newmark"
  beta: 0.25
solver:
  "linear solver":
    type: "direct"
  termination:
    "fail when any":
      - "maximum iterations": 20
    "converge when any":
      - "absolute residual": 1.0e-6
      - "relative residual": 1.0e-10
  type: "newton"
"initial conditions":
  velocity:
    - "node set": "sphere_surf"
      function: "a=10.0; -a*y*z"
      component: "x"
    - "node set": "sphere_surf"
      function: "a=10.0; a*x*z"
      component: "y"
    - "node set": "sphere_surf"
      function: "0.0"
      component: "z"
type: "single"
