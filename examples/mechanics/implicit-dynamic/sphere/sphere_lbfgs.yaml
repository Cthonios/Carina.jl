type: single
input mesh file: sphere.g
output mesh file: sphere_lbfgs.e
model:
  type: solid mechanics
  material:
    blocks:
      sphere: neohookean
    neohookean:
      elastic modulus: 10000.0
      density: 1000.0
      Poisson's ratio: 0.33
time integrator:
  type: newmark
  time step: 0.01
  gamma: 0.5
  final time: 0.04
  initial time: 0.0
  beta: 0.25
initial conditions:
  velocity:
    - node set: sphere_surf
      function: "a=10.0; -a*y*z"
      component: x
    - node set: sphere_surf
      function: "a=10.0; a*x*z"
      component: y
    - node set: sphere_surf
      function: "0.0"
      component: z
solver:
  type: newton
  linear solver:
    type: lbfgs
    history size: 10
  termination:
    fail when any:
      - maximum iterations: 200
    converge when any:
      - absolute residual: 1.0e-6
      - relative residual: 1.0e-10
device: cpu
