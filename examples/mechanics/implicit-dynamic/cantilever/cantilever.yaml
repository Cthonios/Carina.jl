type: single
input mesh file: cantilever.g
output mesh file: cantilever.e
model:
  type: solid mechanics
  material:
    linear elastic:
      elastic modulus: 6.895e9
      density: 2768.0
      Poisson's ratio: 0.25
    blocks:
      cantilever: linear elastic
time integrator:
  type: newmark
  time step: 1.0e-6
  gamma: 0.5
  final time: 3.0e-6
  initial time: 0.0
  beta: 0.25
initial conditions:
  displacement:
    - node set: nsall
      function: "0.393701 * x * x"
      component: y
boundary conditions:
  dirichlet:
    - node set: nsx-
      function: "0.0"
      component: x
    - node set: nsx-
      function: "0.0"
      component: y
    - node set: nsx-
      function: "0.0"
      component: z
solver:
  type: newton
  linear solver:
    type: direct
  termination:
    fail when any:
      - maximum iterations: 16
    converge when any:
      - absolute residual: 2.54e-8
      - relative residual: 1.0e-10
