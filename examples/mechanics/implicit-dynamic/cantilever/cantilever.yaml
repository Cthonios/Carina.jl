type: single

input mesh file:  cantilever.g
output mesh file: cantilever.e

model:
  type: solid mechanics
  material:
    blocks:
      cantilever: linear elastic
    linear elastic:
      elastic modulus: 6.895e+09
      Poisson's ratio: 0.25
      density: 2768.0

time integrator:
  type:        Newmark
  beta:        0.25
  gamma:       0.5
  initial time: 0.0
  final time:   3.0e-6
  time step:    1.0e-6

initial conditions:
  displacement:
    - node set: nsall
      component: y
      function: "0.393701 * x * x"

boundary conditions:
  Dirichlet:
    - node set: nsx-
      component: x
      function: "0.0"
    - node set: nsx-
      component: y
      function: "0.0"
    - node set: nsx-
      component: z
      function: "0.0"

solver:
  type: newton
  maximum iterations: 16
  relative tolerance: 1.0e-10
  absolute tolerance: 2.54e-08
  linear solver:
    type: direct
