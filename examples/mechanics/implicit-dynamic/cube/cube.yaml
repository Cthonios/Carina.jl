type: single

input mesh file:  cube.g
output mesh file: cube.e

model:
  type: solid mechanics
  material:
    blocks:
      cube: neohookean
    neohookean:
      elastic modulus: 10.0e9
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type:  Newmark
  beta:  0.25
  gamma: 0.5
  initial time: 0.0
  final time:   0.1
  time step:    0.01

boundary conditions:
  Dirichlet:
    - side set:   ssx-
      component: x
      function:  "0.0"
    - side set:   ssy-
      component: y
      function:  "0.0"
    - side set:   ssz-
      component: z
      function:  "0.0"
    - side set:   ssz+
      component: z
      function:  "1.0e-3 * t"

solver:
  type: newton
  termination:
    - type: combo
      combo: or
      tests:
        - type: absolute residual
          tolerance: 1.0e-06
        - type: relative residual
          tolerance: 1.0e-10
    - type: maximum iterations
      value: 16
  linear solver:
    type:               minres
    maximum iterations: 500
    tolerance:          1.0e-08
    preconditioner:
      type: jacobi
