type: single
input mesh file: cube.g
output mesh file: cube.e
model:
  type: solid mechanics
  material:
    blocks:
      cube: neohookean
    neohookean:
      elastic modulus: 1.0e10
      density: 1000.0
      Poisson's ratio: 0.25
time integrator:
  type: newmark
  time step: 0.01
  gamma: 0.5
  final time: 0.1
  initial time: 0.0
  beta: 0.25
boundary conditions:
  dirichlet:
    - function: "0.0"
      side set: ssx-
      component: x
    - function: "0.0"
      side set: ssy-
      component: y
    - function: "0.0"
      side set: ssz-
      component: z
    - function: "1.0e-3 * t"
      side set: ssz+
      component: z
solver:
  type: newton
  linear solver:
    type: minres
    preconditioner:
      type: jacobi
    maximum iterations: 500
    tolerance: 1.0e-8
  termination:
    fail when any:
      - maximum iterations: 16
    converge when any:
      - absolute residual: 1.0e-6
      - relative residual: 1.0e-10
device: rocm
