"output mesh file": "cube_lbfgs.e"
"input mesh file": "cube.g"
model:
  material:
    blocks:
      cube: "neohookean"
    neohookean:
      "elastic modulus": 1.0e10
      density: 1000.0
      "Poisson's ratio": 0.25
  type: "solid mechanics"
"boundary conditions":
  dirichlet:
    - function: "0.0"
      "side set": "ssx-"
      component: "x"
    - function: "0.0"
      "side set": "ssy-"
      component: "y"
    - function: "0.0"
      "side set": "ssz-"
      component: "z"
    - function: "1.0e-3 * t"
      "side set": "ssz+"
      component: "z"
"time integrator":
  "time step": 0.01
  gamma: 0.5
  "final time": 0.1
  "initial time": 0.0
  type: "newmark"
  beta: 0.25
solver:
  "linear solver":
    "history size": 10
    type: "lbfgs"
  termination:
    "fail when any":
      - "maximum iterations": 100
    "converge when any":
      - "absolute residual": 1.0e-6
      - "relative residual": 1.0e-10
  type: "newton"
type: "single"
