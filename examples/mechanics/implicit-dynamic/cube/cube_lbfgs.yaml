type: single

input mesh file:  cube.g
output mesh file: cube_lbfgs.e

model:
  type: solid mechanics
  material:
    blocks:
      cube: neohookean
    neohookean:
      elastic modulus: 10.0e9
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type:  Newmark
  beta:  0.25
  gamma: 0.5
  initial time: 0.0
  final time:   0.1
  time step:    0.01

boundary conditions:
  Dirichlet:
    - sideset:   ssx-
      component: x
      function:  "0.0"
    - sideset:   ssy-
      component: y
      function:  "0.0"
    - sideset:   ssz-
      component: z
      function:  "0.0"
    - sideset:   ssz+
      component: z
      function:  "1.0e-3 * t"

solver:
  type: newton
  maximum iterations: 100
  relative tolerance: 1.0e-10
  absolute tolerance: 1.0e-06
  linear solver:
    type:         lbfgs
    history size: 10
