"output mesh file": "cube.e"
"input mesh file": "cube.g"
model:
  material:
    "linear elastic":
      "elastic modulus": 1.0e9
      density: 1000.0
      "Poisson's ratio": 0.25
    blocks:
      cube: "linear elastic"
  type: "solid mechanics"
"time integrator":
  "time step": 0.1
  gamma: 0.5
  "final time": 1.0
  "initial time": 0.0
  type: "newmark"
  beta: 0.25
solver:
  "linear solver":
    type: "direct"
  termination:
    "fail when any":
      - "maximum iterations": 16
    "converge when any":
      - "absolute residual": 1.0e-6
      - "relative residual": 1.0e-10
  type: "newton"
"initial conditions":
  velocity:
    - "node set": "nsall"
      function: "1.0"
      component: "z"
type: "single"
