type: single

input mesh file:  cube.g
output mesh file: cube.e

model:
  type: solid mechanics
  material:
    blocks:
      cube: linear elastic
    linear elastic:
      elastic modulus: 1.0e9
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type:  Newmark
  beta:  0.25
  gamma: 0.5
  initial time: 0.0
  final time:   1.0
  time step:    0.1

initial conditions:
  velocity:
    - node set: nsall
      component: z
      function: "1.0"

solver:
  type: newton
  termination:
    converge when any:
      - absolute residual: 1.0e-06
      - relative residual: 1.0e-10
    fail when any:
      - maximum iterations: 16
  linear solver:
    type: direct
