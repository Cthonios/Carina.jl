type: single
input mesh file: clamped.g
output mesh file: clamped.e
model:
  type: solid mechanics
  material:
    linear elastic:
      elastic modulus: 1.0e9
      density: 1000.0
      Poisson's ratio: 0.0
    blocks:
      clamped: linear elastic
time integrator:
  type: newmark
  time step: 1.0e-6
  gamma: 0.5
  final time: 1.0e-5
  initial time: 0.0
  beta: 0.25
initial conditions:
  displacement:
    - node set: nsall
      function: "a=0.01; s=0.02; a*exp(-z*z/s/s/2)"
      component: z
boundary conditions:
  dirichlet:
    - node set: nsx-
      function: "0.0"
      component: x
    - node set: nsx+
      function: "0.0"
      component: x
    - node set: nsy-
      function: "0.0"
      component: y
    - node set: nsy+
      function: "0.0"
      component: y
    - node set: nsz-
      function: "0.0"
      component: z
    - node set: nsz+
      function: "0.0"
      component: z
solver:
  type: newton
  linear solver:
    type: direct
  termination:
    fail when any:
      - maximum iterations: 4
    converge when all:
      - minimum iterations: 0
      - any:
          - absolute residual: 1.0e-6
          - relative residual: 1.0e-10
