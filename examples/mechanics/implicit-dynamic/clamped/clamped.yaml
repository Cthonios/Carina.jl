"output mesh file": "clamped.e"
"input mesh file": "clamped.g"
model:
  material:
    "linear elastic":
      "elastic modulus": 1.0e9
      density: 1000.0
      "Poisson's ratio": 0.0
    blocks:
      clamped: "linear elastic"
  type: "solid mechanics"
"boundary conditions":
  dirichlet:
    - "node set": "nsx-"
      function: "0.0"
      component: "x"
    - "node set": "nsx+"
      function: "0.0"
      component: "x"
    - "node set": "nsy-"
      function: "0.0"
      component: "y"
    - "node set": "nsy+"
      function: "0.0"
      component: "y"
    - "node set": "nsz-"
      function: "0.0"
      component: "z"
    - "node set": "nsz+"
      function: "0.0"
      component: "z"
"time integrator":
  "time step": 1.0e-6
  gamma: 0.5
  "final time": 1.0e-5
  "initial time": 0.0
  type: "newmark"
  beta: 0.25
solver:
  "linear solver":
    type: "direct"
  termination:
    "fail when any":
      - "maximum iterations": 4
    "converge when all":
      - "minimum iterations": 0
      - any:
          - "absolute residual": 1.0e-6
          - "relative residual": 1.0e-10
  type: "newton"
"initial conditions":
  displacement:
    - "node set": "nsall"
      function: "a=0.01; s=0.02; a*exp(-z*z/s/s/2)"
      component: "z"
type: "single"
