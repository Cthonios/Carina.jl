# Tension specimen — implicit dynamic (Newmark).
#
# Quarter-symmetry neo-Hookean tension specimen with grip, transition, and
# gauge sections.  Smooth displacement ramp on the top grip face:
#   u_y(t) = 0.005 * 0.5 * (1 - cos(pi*t))
# reaching 0.005 m at t = 1 s (zero velocity at start and end).
#
# Symmetry BCs: u_x = 0 on sym_x, u_y = 0 on sym_y, u_z = 0 on sym_z.
#
# Material: neo-Hookean, E = 1 GPa, nu = 0.25, rho = 1000 kg/m^3.
# Geometry scaled to inches (journal file applies 0.0254 factor).
#
# Matches Norma examples/ahead/single/tension-specimen/dynamic/.
type: single

input mesh file:  tension-specimen.g
output mesh file: tension-specimen.e

model:
  type: solid mechanics
  material:
    blocks:
      tension: neohookean
    neohookean:
      elastic modulus: 1.0e9
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type:  Newmark
  beta:  0.25
  gamma: 0.5
  initial time: 0.0
  final time:   1.0
  time step:    0.01

boundary conditions:
  Dirichlet:
    - node set: sym_y
      component: y
      function: "0.0"
    - node set: sym_x
      component: x
      function: "0.0"
    - node set: sym_z
      component: z
      function: "0.0"
    - node set: top_y
      component: y
      function: "0.005 * 0.5 * (1.0 - cos(pi*t))"

solver:
  type: newton
  termination:
    converge when all:
      - minimum iterations: 0
      - any:
          - absolute residual: 1.0e-05
          - relative residual: 1.0e-07
    fail when any:
      - maximum iterations: 16
  linear solver:
    type: direct
