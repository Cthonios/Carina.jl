"output mesh file": "tension-specimen.e"
"input mesh file": "tension-specimen.g"
model:
  material:
    blocks:
      tension: "neohookean"
    neohookean:
      "elastic modulus": 1.0e9
      density: 1000.0
      "Poisson's ratio": 0.25
  type: "solid mechanics"
"boundary conditions":
  dirichlet:
    - "node set": "sym_y"
      function: "0.0"
      component: "y"
    - "node set": "sym_x"
      function: "0.0"
      component: "x"
    - "node set": "sym_z"
      function: "0.0"
      component: "z"
    - "node set": "top_y"
      function: "0.005 * 0.5 * (1.0 - cos(pi*t))"
      component: "y"
"time integrator":
  "time step": 0.01
  gamma: 0.5
  "final time": 1.0
  "initial time": 0.0
  type: "newmark"
  beta: 0.25
solver:
  "linear solver":
    type: "direct"
  termination:
    "fail when any":
      - "maximum iterations": 16
    "converge when all":
      - "minimum iterations": 0
      - any:
          - "absolute residual": 1.0e-5
          - "relative residual": 1.0e-7
  type: "newton"
type: "single"
