type: single
input mesh file: torsion.g
output mesh file: torsion_lbfgs.e
model:
  type: solid mechanics
  material:
    blocks:
      torsion: neohookean
    neohookean:
      elastic modulus: 1.0e9
      density: 1000.0
      Poisson's ratio: 0.25
time integrator:
  type: newmark
  time step: 2.0e-6
  gamma: 0.5
  final time: 2.0e-6
  initial time: 0.0
  beta: 0.25
initial conditions:
  velocity:
    - node set: nsall
      function: "a=8000; -a*y*z"
      component: x
    - node set: nsall
      function: "a=8000; a*x*z"
      component: y
    - node set: nsall
      function: "0.0"
      component: z
solver:
  type: newton
  linear solver:
    type: lbfgs
    history size: 10
  termination:
    fail when any:
      - maximum iterations: 200
    converge when any:
      - absolute residual: 1.0e-6
      - relative residual: 1.0e-10
device: cpu
