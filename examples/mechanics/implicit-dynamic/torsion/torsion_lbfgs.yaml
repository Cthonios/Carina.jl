type: single
device: cpu

input mesh file:  torsion.g
output mesh file: torsion_lbfgs.e

model:
  type: solid mechanics
  material:
    blocks:
      torsion: neohookean
    neohookean:
      elastic modulus: 1.0e+09
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type:         Newmark
  beta:         0.25
  gamma:        0.5
  initial time: 0.0
  final time:   2.0e-06
  time step:    2.0e-06

initial conditions:
  velocity:
    - node set: nsall
      component: x
      function: "a=8000; -a*y*z"
    - node set: nsall
      component: y
      function: "a=8000; a*x*z"
    - node set: nsall
      component: z
      function: "0.0"

solver:
  type: newton
  maximum iterations: 200
  termination:
    - type: absolute residual
      tolerance: 1.0e-06
    - type: relative residual
      tolerance: 1.0e-10
  linear solver:
    type:         lbfgs
    history size: 10
