type: single

input mesh file:  cube.g
output mesh file: cube.e

model:
  type: solid mechanics
  material:
    blocks:
      cube: linear elastic
    linear elastic:
      elastic modulus: 1.0e9
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type: quasi static
  initial time: 0.0
  final time:   1.0
  time step:    0.1

boundary conditions:
  Dirichlet:
    - side set:   ssx-
      component: x
      function:  "0.0"
    - side set:   ssy-
      component: y
      function:  "0.0"
    - side set:   ssz-
      component: z
      function:  "0.0"
  Neumann:
    - side set:   ssz+
      component: z
      function:  "1.0e+09 * t"

solver:
  type: newton
  termination:
    - type: combo
      combo: or
      tests:
        - type: absolute residual
          tolerance: 1.0e-08
        - type: relative residual
          tolerance: 1.0e-14
    - type: maximum iterations
      value: 16
  linear solver:
    type: direct
