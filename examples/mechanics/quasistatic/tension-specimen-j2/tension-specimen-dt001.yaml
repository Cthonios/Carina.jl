# Tension specimen — quasi-static, J2 plasticity, dt=0.001.
# Fixed time step for step-by-step comparison with Norma.
type: single

input mesh file:  tension-specimen.g
output mesh file: tension-specimen-dt001.e
output interval:  0.01

output:
  stress:             true
  internal variables: true

model:
  type: solid mechanics
  material:
    blocks:
      tension: j2 plasticity
    j2 plasticity:
      elastic modulus:    70.0e9
      Poisson's ratio:    0.36
      density:            2700.0
      yield stress:       250.0e6
      hardening modulus:  0.7e9

time integrator:
  type: quasi static
  initial time: 0.0
  final time:   1.0
  time step:    0.01

boundary conditions:
  Dirichlet:
    - node set: sym_y
      component: y
      function: "0.0"
    - node set: sym_x
      component: x
      function: "0.0"
    - node set: sym_z
      component: z
      function: "0.0"
    - node set: top_y
      component: y
      function: "0.005 * t"

solver:
  type: newton
  termination:
    - type: combo
      combo: and
      tests:
        - type: minimum iterations
          value: 0
        - type: combo
          combo: or
          tests:
            - type: absolute residual
              tolerance: 1.0e-08
            - type: relative residual
              tolerance: 1.0e-12
    - type: maximum iterations
      value: 16
  use line search: true
  linear solver:
    type: direct
