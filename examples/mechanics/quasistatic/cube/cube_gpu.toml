input_mesh_file = "cube.g"
device = "rocm"
type = "single"
output_mesh_file = "cube.e"

[[boundary_conditions.dirichlet]]
side_set = "ssx-"
function = "0.0"
component = "x"
[[boundary_conditions.dirichlet]]
side_set = "ssy-"
function = "0.0"
component = "y"
[[boundary_conditions.dirichlet]]
side_set = "ssz-"
function = "0.0"
component = "z"
[[boundary_conditions.dirichlet]]
side_set = "ssz+"
function = "1.0e-3 * t"
component = "z"

[model]
type = "solid_mechanics"

    [model.material.blocks]
    cube = "neohookean"

    [model.material.neohookean]
    density = 1000.0
    poissons_ratio = 0.25
    elastic_modulus = 1.0e10

[time_integrator]
final_time = 1.0
time_step = 0.1
initial_time = 0.0
type = "quasi_static"

[solver]
type = "newton"

    [solver.linear_solver]
    type = "iterative"

    [[solver.termination.fail_when_any]]
    maximum_iterations = 16

    [[solver.termination.converge_when_any]]
    absolute_residual = 1.0e-6
    [[solver.termination.converge_when_any]]
    relative_residual = 1.0e-10
