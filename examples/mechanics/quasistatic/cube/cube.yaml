type: single

input mesh file:  cube.g
output mesh file: cube.e

model:
  type: solid mechanics
  material:
    blocks:
      cube: neohookean
    neohookean:
      elastic modulus: 10.0e9
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type: quasi static
  initial time: 0.0
  final time:   1.0
  time step:    0.1

boundary conditions:
  Dirichlet:
    - side set:   ssx-
      component: x
      function:  "0.0"
    - side set:   ssy-
      component: y
      function:  "0.0"
    - side set:   ssz-
      component: z
      function:  "0.0"
    - side set:   ssz+
      component: z
      function:  "1.0e-3 * t"

solver:
  type: newton
  maximum iterations: 16
  termination:
    - type: absolute residual
      tolerance: 1.0e-06
    - type: relative residual
      tolerance: 1.0e-10
  linear solver:
    type: direct
