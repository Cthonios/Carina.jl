type: single

input mesh file:  cube.g
output mesh file: cube_nlcg.e

model:
  type: solid mechanics
  material:
    blocks:
      cube: linear elastic
    linear elastic:
      elastic modulus: 10.0e9
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type: quasi static
  initial time: 0.0
  final time:   1.0
  time step:    0.1

boundary conditions:
  Dirichlet:
    - side set:   ssx-
      component: x
      function:  "0.0"
    - side set:   ssy-
      component: y
      function:  "0.0"
    - side set:   ssz-
      component: z
      function:  "0.0"
    - side set:   ssz+
      component: z
      function:  "1.0e-3 * t"

solver:
  type: nonlinear cg
  maximum iterations: 200
  termination:
    - type: absolute residual
      tolerance: 1.0e-08
    - type: relative residual
      tolerance: 1.0e-14
  use line search: true
  line search maximum iterations: 30
  preconditioner:
    type: jacobi
