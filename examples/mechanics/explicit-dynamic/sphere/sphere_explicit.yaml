type: single
device: cpu

input mesh file:  sphere.g
output mesh file: sphere_explicit.e

model:
  type: solid mechanics
  material:
    blocks:
      sphere: neohookean
    neohookean:
      elastic modulus: 1.0e+04
      Poisson's ratio: 0.33
      density: 1000.0

time integrator:
  type:         central difference
  gamma:        0.5
  initial time: 0.0
  final time:   1.0e-02
  time step:    1.0e-02

initial conditions:
  velocity:
    - node set: sphere_surf
      component: x
      function: "a=10.0; -a*y*z"
    - node set: sphere_surf
      component: y
      function: "a=10.0; a*x*z"
    - node set: sphere_surf
      component: z
      function: "0.0"
