type: single
input mesh file: clamped-bc.g
output mesh file: clamped-bc.e
output interval: 1.0e-5
model:
  type: solid mechanics
  material:
    linear elastic:
      elastic modulus: 1.0e9
      density: 1000.0
      Poisson's ratio: 0.0
    blocks:
      clamped: linear elastic
time integrator:
  type: central difference
  time step: 5.0e-7
  gamma: 0.5
  final time: 0.00075
  initial time: 0.0
boundary conditions:
  dirichlet:
    - node set: nsx-
      function: "0.0"
      component: x
    - node set: nsx+
      function: "0.0"
      component: x
    - node set: nsy-
      function: "0.0"
      component: y
    - node set: nsy+
      function: "0.0"
      component: y
    - node set: nsz-
      function: "a=1.0e-3; tc=2.5e-4; tau=5.0e-5; a*exp(-(t-tc)*(t-tc)/tau/tau/2)"
      component: z
    - node set: nsz+
      function: "0.0"
      component: z
