type: single

input mesh file:  cube.g
output mesh file: cube.e
output interval:  10

output:
  velocity:             true
  acceleration:         true
  stress:               true
  deformation gradient: false
  internal variables:   false

model:
  type: solid mechanics
  material:
    blocks:
      cube: neohookean
    neohookean:
      elastic modulus: 1.0e+03
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type:        central difference
  gamma:       0.5
  initial time: 0.0
  final time:   1.0
  time step:    0.01

initial conditions:
  velocity:
    - node set: nsall
      component: z
      function: "1.0"
