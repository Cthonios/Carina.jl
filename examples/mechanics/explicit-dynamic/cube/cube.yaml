type: single
input mesh file: cube.g
output mesh file: cube.e
output interval: 0.1
output:
  acceleration: true
  deformation gradient: false
  stress: true
  velocity: true
  internal variables: false
model:
  type: solid mechanics
  material:
    blocks:
      cube: neohookean
    neohookean:
      elastic modulus: 1000.0
      density: 1000.0
      Poisson's ratio: 0.25
time integrator:
  type: central difference
  time step: 0.01
  gamma: 0.5
  final time: 1.0
  initial time: 0.0
initial conditions:
  velocity:
    - node set: nsall
      function: "1.0"
      component: z
