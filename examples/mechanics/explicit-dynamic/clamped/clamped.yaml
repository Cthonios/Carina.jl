# Elastic wave propagation in a clamped beam — explicit central difference.
#
# Reference: Mota, Tezaur, Phlipot, "The Schwarz alternating method for
#   transient solid dynamics", IJNME 123:5036-5071, 2022, Section 3.3.
#
# Geometry:
#   Beam l x l x L, l = 1 mm, L = 1 m.  Mesh: 1x1x1000 hex8 elements.
#   Coordinate system: x,y in [-l/2, l/2], z in [-L/2, L/2].
#
# Material: linear elastic, E = 1 GPa, nu = 0, rho = 1000 kg/m^3.
#   Wave speed c = sqrt(E/rho) = 1000 m/s.  Period T = L/c = 1 ms.
#
# BCs: all faces clamped (homogeneous Dirichlet on x,y displacements
#   at x = +/-l/2, y = +/-l/2; z-displacement at z = +/-L/2).
#
# IC: Gaussian pulse centered at beam midpoint (z = 0):
#   u_z(x, 0) = a * exp(-z^2 / (2*s^2)),  a = 0.01 m, s = 0.02 m.
#
# Exact solution (eq. 28 in the paper, with b = 0):
#   u_z(z, t) = f(z - c*t) + f(z + c*t) - f(z - c*(T-t)) - f(z + c*(T-t))
#   where f(z) = (a/2) * exp(-z^2 / (2*s^2))  and  T = L/c.
#
# CFL: h/c = 0.001/1000 = 1e-6 s.  dt = 1e-7 s gives CFL = 0.1.
type: single

input mesh file:  clamped.g
output mesh file: clamped.e
output interval:  1.0e-06

model:
  type: solid mechanics
  material:
    blocks:
      clamped: linear elastic
    linear elastic:
      elastic modulus: 1.0e9
      Poisson's ratio: 0.0
      density: 1000.0

time integrator:
  type:        central difference
  gamma:       0.5
  initial time: 0.0
  final time:   1.0e-05
  time step:    1.0e-07

initial conditions:
  displacement:
    - node set: nsall
      component: z
      function: "a=0.01; s=0.02; a*exp(-z*z/s/s/2)"

boundary conditions:
  Dirichlet:
    - nodeset: nsx-
      component: x
      function: "0.0"
    - nodeset: nsx+
      component: x
      function: "0.0"
    - nodeset: nsy-
      component: y
      function: "0.0"
    - nodeset: nsy+
      component: y
      function: "0.0"
    - nodeset: nsz-
      component: z
      function: "0.0"
    - nodeset: nsz+
      component: z
      function: "0.0"

