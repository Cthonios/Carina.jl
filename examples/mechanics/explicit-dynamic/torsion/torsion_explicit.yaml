type: single
input mesh file: torsion.g
output mesh file: torsion_explicit.e
model:
  type: solid mechanics
  material:
    blocks:
      torsion: neohookean
    neohookean:
      elastic modulus: 1.0e9
      density: 1000.0
      Poisson's ratio: 0.25
time integrator:
  type: central difference
  time step: 5.0e-7
  gamma: 0.5
  final time: 2.0e-6
  initial time: 0.0
initial conditions:
  velocity:
    - node set: nsall
      function: "a=8000; -a*y*z"
      component: x
    - node set: nsall
      function: "a=8000; a*x*z"
      component: y
    - node set: nsall
      function: "0.0"
      component: z
device: cpu
