type: single
device: cpu

input mesh file:  torsion.g
output mesh file: torsion_explicit.e
output interval:  1

model:
  type: solid mechanics
  material:
    blocks:
      torsion: neohookean
    neohookean:
      elastic modulus: 1.0e+09
      Poisson's ratio: 0.25
      density: 1000.0

time integrator:
  type:         central difference
  gamma:        0.5
  initial time: 0.0
  final time:   2.0e-06
  time step:    5.0e-07

initial conditions:
  velocity:
    - node set: nsall
      component: x
      function: "a=8000; -a*y*z"
    - node set: nsall
      component: y
      function: "a=8000; a*x*z"
    - node set: nsall
      component: z
      function: "0.0"

solver:
  maximum iterations: 1
  relative tolerance: 1.0e-10
  absolute tolerance: 1.0e-06
